<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitAgent - Premium Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f1f3f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #main-wrapper { display: flex; width: 98vw; max-width: 1400px; height: 95vh; background: #fff; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); overflow: hidden; }
        
        /* --- 좌측 채팅 섹션 --- */
        #chat-section { flex: 4; display: flex; flex-direction: column; border-right: 1px solid #e9ecef; background: #fff; min-width: 350px; }
        header { background: #2c3e50; color: #fff; padding: 20px; text-align: center; font-weight: 700; font-size: 1.2rem; letter-spacing: 1px; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #f8f9fa; }
        
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 16px; line-height: 1.5; font-size: 0.95rem; word-break: keep-all; }
        .user-msg { background: #3498db; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 2px 5px rgba(52,152,219,0.2); }
        .bot-msg { background: #fff; color: #2d3436; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e9ecef; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        
        /* 타이핑 인디케이터 */
        .typing-msg { display: flex; align-items: center; gap: 6px; font-style: italic; color: #636e72; }
        .dot { width: 6px; height: 6px; background: #b2bec3; border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }

        #input-area { padding: 20px; display: flex; gap: 10px; background: #fff; border-top: 1px solid #edf2f7; }
        #user-input { flex: 1; padding: 14px 18px; border: 1px solid #dfe6e9; border-radius: 12px; outline: none; font-size: 1rem; transition: border 0.2s; }
        #user-input:focus { border-color: #3498db; }
        #send-btn { background: #2c3e50; color: #fff; border: none; padding: 0 24px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        #send-btn:hover { background: #1a252f; }

        /* --- 우측 대시보드 섹션 --- */
        #dashboard-section { flex: 6; padding: 40px; background: #fdfdfd; overflow-y: auto; }
        .dashboard-header { font-size: 1.5rem; font-weight: 800; color: #2d3436; margin-bottom: 25px; border-bottom: 2px solid #3498db; display: inline-block; padding-bottom: 8px; }
        #dashboard-grid { display: flex; flex-direction: column; gap: 25px; }
        
        .card { background: #fff; border-radius: 16px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f1f3f5; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .card-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: #2d3436; }
        
        /* 추천 식단 테이블 스타일 */
        .rec-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 0.95rem; }
        .rec-table th, .rec-table td { padding: 12px; text-align: right; border-bottom: 1px solid #f1f3f5; }
        .rec-table th { background-color: #f8f9fa; color: #636e72; font-weight: 600; text-align: right; }
        .rec-table th:first-child, .rec-table td:first-child { text-align: left; }
        .rec-table tr:hover { background-color: #fcfcfc; }
        .food-name { font-weight: 600; color: #3498db; }
        .food-amount { font-size: 0.8rem; color: #636e72; background: #f1f2f6; padding: 3px 8px; border-radius: 12px; margin-left: 8px; font-weight: 500; }
        .macro-cell { color: #636e72; }
        
        .rec-reason { margin-top: 15px; padding: 16px; background: #f0f7ff; border-radius: 10px; font-size: 0.95rem; color: #2d3436; border-left: 4px solid #3498db; line-height: 1.5; }
        
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-container { height: 260px; position: relative; width: 100%; }

        @media (max-width: 900px) {
            #main-wrapper { flex-direction: column; }
            #chat-section { flex: none; height: 50vh; border-right: none; border-bottom: 1px solid #e9ecef; }
            #dashboard-section { flex: none; height: 50vh; }
            .chart-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="chat-section">
        <header><i class="fas fa-bolt"></i> FitAgent</header>
        <div id="chat-window">
            <div class="msg bot-msg">환영합니다! 오늘 섭취한 식단이나 수행한 운동을 알려주시면 정밀 분석과 맞춤형 식단을 제공합니다. 운동 루틴과 식단 추천도 받으실 수 있습니다.</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="예: 풀업 5세트, 시티드 로우 5세트 했고 식단 추천해줘!" onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="dashboard-section">
        <div class="dashboard-header"><i class="fas fa-chart-pie"></i> 실시간 분석 리포트</div>
        <div id="dashboard-grid">
            <div id="empty-msg" style="text-align:center; color:#b2bec3; margin-top:80px; font-size:1.1rem;">
                <i class="fas fa-clipboard-list fa-3x" style="margin-bottom:15px; opacity:0.5;"></i><br>
                대화를 시작하면 이곳에 상세 데이터가 시각화됩니다.
            </div>
        </div>
    </div>
</div>

<script>
    const chatWindow = document.getElementById("chat-window");
    const dashboardGrid = document.getElementById("dashboard-grid");
    const emptyMsg = document.getElementById("empty-msg");
    let chartCounter = 0;
    
    let conversationHistory = []; 

    async function sendMessage() {
        const input = document.getElementById("user-input");
        const text = input.value.trim();
        if (!text) return;

        appendMsg(text, 'user-msg');
        input.value = '';

        conversationHistory.push({ role: "user", content: text });

        const typingIndicator = createTypingIndicator();
        chatWindow.appendChild(typingIndicator);
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const res = await fetch("http://localhost:8000/api/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ messages: conversationHistory })
            });
            const data = await res.json();
            
            typingIndicator.remove(); 
            
            if(data.response) {
                conversationHistory.push({ role: "assistant", content: data.response });
                
                if (conversationHistory.length > 10) {
                    conversationHistory = conversationHistory.slice(-10);
                }

                parseAndRender(data.response);
            }
        } catch(e) { 
            typingIndicator.remove();
            appendMsg("서버 통신 오류. app.py가 실행 중인지 확인하세요.", 'bot-msg'); 
            conversationHistory.pop(); 
        }
    }

    function createTypingIndicator() {
        const div = document.createElement('div');
        div.className = 'msg bot-msg typing-msg';
        div.innerHTML = `준비 중 <div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
        return div;
    }

    function parseAndRender(rawText) {
        let text = rawText;
        let nutriData = null, workData = null, recData = null;
        
        const recMatch = text.match(/<recommendation>([\s\S]*?)<\/recommendation>/);
        if(recMatch) { recData = JSON.parse(recMatch[1]); text = text.replace(recMatch[0], ''); }

        const nutriMatch = text.match(/<nutrition>([\s\S]*?)<\/nutrition>/);
        if(nutriMatch) { nutriData = JSON.parse(nutriMatch[1]); text = text.replace(nutriMatch[0], ''); }

        const workMatch = text.match(/<workout>([\s\S]*?)<\/workout>/);
        if(workMatch) { workData = JSON.parse(workMatch[1]); text = text.replace(workMatch[0], ''); }

        if (nutriData || workData || recData) {
            dashboardGrid.innerHTML = ''; 
        }

        if (nutriData || workData) {
            renderChartsRow(nutriData, workData);
        }
        
        if (recData) {
            renderRecommendation(recData);
        }

        appendMsg(text.trim().replace(/\n/g, '<br>'), 'bot-msg', true);
    }

    function renderChartsRow(nutriData, workData) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'chart-row card';
        let innerHtml = '';
        let nutriId = `chart-n-${chartCounter}`;
        let workId = `chart-w-${chartCounter}`;
        
        if(nutriData) {
            innerHtml += `
                <div>
                    <div class="card-title"><i class="fas fa-chart-pie" style="color:#3498db"></i> 영양소 밸런스</div>
                    <div class="chart-container"><canvas id="${nutriId}"></canvas></div>
                </div>`;
        }
        if(workData) {
            innerHtml += `
                <div>
                    <div class="card-title"><i class="fas fa-running" style="color:#2ecc71"></i> 근육 자극 분포</div>
                    <div class="chart-container"><canvas id="${workId}"></canvas></div>
                </div>`;
        }
        
        rowDiv.innerHTML = innerHtml;
        dashboardGrid.prepend(rowDiv);

        setTimeout(() => {
            if(nutriData) {
                let carbs = parseFloat(nutriData.carbs) || 0;
                let protein = parseFloat(nutriData.protein) || 0;
                let fat = parseFloat(nutriData.fat) || 0;
                let totalMacros = carbs + protein + fat;

                if (totalMacros > 0) {
                    new Chart(document.getElementById(nutriId), {
                        type: 'doughnut',
                        data: { 
                            labels: ['탄수화물', '단백질', '지방'], 
                            datasets: [{ data: [carbs, protein, fat], backgroundColor: ['#3498db', '#e74c3c', '#f1c40f'], borderWidth: 0 }] 
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
                    });
                } else {
                    new Chart(document.getElementById(nutriId), {
                        type: 'doughnut',
                        data: { 
                            labels: ['식단 기록 없음'], 
                            datasets: [{ data: [1], backgroundColor: ['#e9ecef'], borderWidth: 0 }] 
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            plugins: { 
                                legend: { position: 'bottom' },
                                tooltip: { enabled: false }
                            } 
                        }
                    });
                }
            }
            if(workData) {
                const defaultMuscles = ['가슴', '등', '하체', '어깨', '팔', '코어'];
                let labels = Array.from(new Set([...defaultMuscles, ...Object.keys(workData)]));
                let dataValues = labels.map(label => parseFloat(workData[label]) || 0);

                new Chart(document.getElementById(workId), {
                    type: 'radar',
                    data: { 
                        labels: labels, 
                        datasets: [{ 
                            label: '자극 비중', 
                            data: dataValues, 
                            backgroundColor: 'rgba(46, 204, 113, 0.4)', 
                            borderColor: '#2ecc71', 
                            pointBackgroundColor: '#2ecc71',
                            pointBorderColor: '#fff',
                            pointHoverBackgroundColor: '#fff',
                            pointHoverBorderColor: '#2ecc71'
                        }] 
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        scales: { 
                            r: { 
                                min: 0,
                                suggestedMax: Math.max(...dataValues) > 0 ? Math.max(...dataValues) : 100,
                                ticks: { display: false },
                                pointLabels: { font: { size: 12, weight: 'bold', family: 'Pretendard' }, color: '#636e72' },
                                grid: { color: 'rgba(0, 0, 0, 0.05)' },
                                angleLines: { color: 'rgba(0, 0, 0, 0.05)' } 
                            } 
                        }, 
                        plugins: { legend: { display: false } } 
                    }
                });
            }
        }, 100);
        chartCounter++;
    }

    function renderRecommendation(data) {
        const card = document.createElement('div');
        card.className = 'card';
        
        let tableRows = data.foods.map(f => `
            <tr>
                <td style="text-align: left;">
                    <span class="food-name">${f.name}</span>
                    <span class="food-amount">${f.amount}</span>
                </td>
                <td><strong>${f.kcal}</strong></td>
                <td class="macro-cell">${f.carbs}g</td>
                <td class="macro-cell">${f.protein}g</td>
                <td class="macro-cell">${f.fat}g</td>
            </tr>
        `).join('');

        card.innerHTML = `
            <div class="card-title"><i class="fas fa-lightbulb" style="color:#f1c40f"></i> AI 맞춤 추천 식단</div>
            <div style="font-size:1.1rem; font-weight:700; color:#2d3436; margin-bottom:15px;">"${data.title}"</div>
            
            <table class="rec-table">
                <thead>
                    <tr>
                        <th style="text-align: left;">음식명</th>
                        <th>칼로리(kcal)</th>
                        <th>탄수화물</th>
                        <th>단백질</th>
                        <th>지방</th>
                    </tr>
                </thead>
                <tbody>
                    ${tableRows}
                </tbody>
            </table>
            
            <div class="rec-reason"><i class="fas fa-info-circle"></i> <strong>Tip:</strong> ${data.reason}</div>
        `;
        dashboardGrid.prepend(card);
    }

    function appendMsg(text, cls, isHtml=false) {
        const d = document.createElement('div');
        d.className = `msg ${cls}`;
        if(isHtml) d.innerHTML = text; else d.innerText = text;
        chatWindow.appendChild(d);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>

</body>
</html>
